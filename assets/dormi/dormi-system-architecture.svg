<svg width="760" height="470" viewBox="0 0 760 470" xmlns="http://www.w3.org/2000/svg" font-family="Inter, 'Segoe UI', sans-serif">
<title>Dormi — System Architecture</title>

<defs>
  <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
    <path d="M2 1L8 5L2 9" fill="none" stroke="#6B7280" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
  </marker>
</defs>

<rect x="0" y="0" width="760" height="470" fill="#FFFFFF"/>

<!-- Client -->
<rect x="230" y="30" width="300" height="56" rx="8" fill="#EFF6FF" stroke="#1D4ED8" stroke-width="1"/>
<text x="380" y="52" text-anchor="middle" font-size="15" font-weight="600" fill="#1E3A8A">Next.js Frontend</text>
<text x="380" y="70" text-anchor="middle" font-size="12" fill="#3B5998">Owner / Tenant UI</text>

<line x1="380" y1="86" x2="380" y2="130" stroke="#9CA3AF" stroke-width="1.5" marker-end="url(#arrow)"/>
<text x="396" y="112" font-size="11" fill="#6B7280">REST + session cookie</text>

<!-- Backend container -->
<rect x="40" y="130" width="680" height="190" rx="10" fill="#E1F5EE" stroke="#0F6E56" stroke-width="1"/>
<text x="60" y="154" font-size="15" font-weight="600" fill="#04342C">NestJS Backend — Modular Monolith</text>
<text x="60" y="172" font-size="12" fill="#0F6E56">SessionAuthGuard on every route</text>

<!-- Service chips -->
<g font-size="12.5" font-weight="600" fill="#04342C">
  <rect x="60" y="190" width="120" height="46" rx="8" fill="#FFFFFF" stroke="#0F6E56" stroke-width="1"/>
  <text x="120" y="217" text-anchor="middle">Auth Service</text>

  <rect x="190" y="190" width="120" height="46" rx="8" fill="#FFFFFF" stroke="#0F6E56" stroke-width="1"/>
  <text x="250" y="217" text-anchor="middle">User Service</text>

  <rect x="320" y="190" width="120" height="46" rx="8" fill="#FFFFFF" stroke="#0F6E56" stroke-width="1"/>
  <text x="380" y="217" text-anchor="middle">Apartment Service</text>

  <rect x="450" y="190" width="120" height="46" rx="8" fill="#FFFFFF" stroke="#0F6E56" stroke-width="1"/>
  <text x="510" y="217" text-anchor="middle">Ticket Service</text>

  <rect x="580" y="190" width="120" height="46" rx="8" fill="#FFFFFF" stroke="#0F6E56" stroke-width="1"/>
  <text x="640" y="217" text-anchor="middle">Payment Service</text>
</g>

<g font-size="11.5" fill="#3F5B52">
  <text x="60" y="260">Cross-cutting: DTO validation (class-validator) · TypeORM repositories · Swagger docs</text>
  <text x="60" y="280">Ticket domain: state machine, status history log, apartment-ownership checks</text>
  <text x="60" y="300">Transactions: dataSource.transaction() for multi-table writes (e.g. ticket + first history row)</text>
</g>

<line x1="380" y1="320" x2="380" y2="366" stroke="#9CA3AF" stroke-width="1.5" marker-end="url(#arrow)"/>
<text x="396" y="347" font-size="11" fill="#6B7280">TypeORM</text>

<!-- Database -->
<rect x="230" y="366" width="300" height="56" rx="8" fill="#F3E8FF" stroke="#7C3AED" stroke-width="1"/>
<text x="380" y="388" text-anchor="middle" font-size="15" font-weight="600" fill="#4C1D95">PostgreSQL</text>
<text x="380" y="406" text-anchor="middle" font-size="12" fill="#6D28D9">Tickets, apartments, users, payments</text>

<!-- Dev tooling -->
<rect x="580" y="30" width="150" height="66" rx="8" fill="none" stroke="#9CA3AF" stroke-width="1" stroke-dasharray="4 3"/>
<text x="655" y="52" text-anchor="middle" font-size="12" font-weight="600" fill="#4B5563">Dev tooling</text>
<text x="655" y="70" text-anchor="middle" font-size="10.5" fill="#6B7280">Bruno · GitHub</text>
<text x="655" y="84" text-anchor="middle" font-size="10.5" fill="#6B7280">ClickUp (PM)</text>

</svg>
