<svg width="680" height="540" viewBox="0 0 680 540" xmlns="http://www.w3.org/2000/svg" font-family="Inter, 'Segoe UI', sans-serif">
<title>Dormi — Ticket Data Flow</title>

<defs>
  <marker id="arrow2" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
    <path d="M2 1L8 5L2 9" fill="none" stroke="#6B7280" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
  </marker>
</defs>

<rect x="0" y="0" width="680" height="540" fill="#FFFFFF"/>

<rect x="230" y="20" width="220" height="56" rx="8" fill="#F3F4F6" stroke="#6B7280" stroke-width="1"/>
<text x="340" y="42" text-anchor="middle" font-size="14" font-weight="600" fill="#1F2937">ผู้เช่า / เจ้าของหอ</text>
<text x="340" y="60" text-anchor="middle" font-size="11.5" fill="#4B5563">กรอกฟอร์มแจ้งซ่อม</text>

<line x1="340" y1="76" x2="340" y2="120" stroke="#9CA3AF" stroke-width="1.5" marker-end="url(#arrow2)"/>

<rect x="230" y="120" width="220" height="56" rx="8" fill="#EFF6FF" stroke="#1D4ED8" stroke-width="1"/>
<text x="340" y="142" text-anchor="middle" font-size="14" font-weight="600" fill="#1E3A8A">Next.js Frontend</text>
<text x="340" y="160" text-anchor="middle" font-size="11.5" fill="#3B5998">POST /tickets (fetch + cookie)</text>

<line x1="340" y1="176" x2="340" y2="220" stroke="#9CA3AF" stroke-width="1.5" marker-end="url(#arrow2)"/>

<rect x="200" y="220" width="280" height="66" rx="8" fill="#E1F5EE" stroke="#0F6E56" stroke-width="1"/>
<text x="340" y="242" text-anchor="middle" font-size="14" font-weight="600" fill="#04342C">TicketController → TicketService</text>
<text x="340" y="260" text-anchor="middle" font-size="11.5" fill="#0F6E56">Guard → validate DTO → check ownership</text>
<text x="340" y="274" text-anchor="middle" font-size="11.5" fill="#0F6E56">→ generate ticketNumber</text>

<line x1="340" y1="286" x2="340" y2="330" stroke="#9CA3AF" stroke-width="1.5" marker-end="url(#arrow2)"/>

<rect x="200" y="330" width="280" height="56" rx="8" fill="#F3E8FF" stroke="#7C3AED" stroke-width="1"/>
<text x="340" y="352" text-anchor="middle" font-size="14" font-weight="600" fill="#4C1D95">PostgreSQL</text>
<text x="340" y="370" text-anchor="middle" font-size="11.5" fill="#6D28D9">Transaction: ticket + status history (OPEN)</text>

<line x1="340" y1="386" x2="340" y2="430" stroke="#9CA3AF" stroke-width="1.5" marker-end="url(#arrow2)"/>

<rect x="230" y="430" width="220" height="56" rx="8" fill="#EFF6FF" stroke="#1D4ED8" stroke-width="1"/>
<text x="340" y="452" text-anchor="middle" font-size="14" font-weight="600" fill="#1E3A8A">Next.js Frontend</text>
<text x="340" y="470" text-anchor="middle" font-size="11.5" fill="#3B5998">แสดงตั๋วใหม่ + badge สถานะ</text>

<line x1="340" y1="486" x2="340" y2="500" stroke="#9CA3AF" stroke-width="1.5" marker-end="url(#arrow2)"/>

<text x="340" y="514" text-anchor="middle" font-size="11.5" fill="#4B5563">สตาฟกดเปลี่ยนสถานะภายหลัง (Acknowledged → In Progress → Resolved)</text>
<text x="340" y="530" text-anchor="middle" font-size="11.5" fill="#4B5563">→ ย้อนกลับไปที่ TicketStatusService ตรวจ state machine แล้ววนซ้ำ 3 ขั้นตอนบน</text>

</svg>
